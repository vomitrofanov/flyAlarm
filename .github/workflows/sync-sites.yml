name: Sync flying-site database
on:
  schedule:
    - cron: '0 3 * * 1'        # every Monday 03:00 UTC
  workflow_dispatch:            # ... and on demand from the Actions tab
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Pull all countries from ParaglidingEarth
        run: node scripts/sync-sites.mjs
      - name: Commit database if changed
        run: |
          git config user.name "flyalarm-bot"
          git config user.email "bot@flyalarm.app"
          git add data
          git diff --staged --quiet || git commit -m "site database sync $(date -u +%F)"
          git push
